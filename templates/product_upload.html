{% extends "base.html" %}

{% block content %}
<div class="upload-container">
    <div class="upload-header">
        <h1 class="upload-title">
            <i class="fas fa-plus-circle"></i>
            List Your Item
        </h1>
        <p class="upload-subtitle">Share what you want to trade with the community</p>
    </div>

    <div class="upload-form-container">
        <form method="POST" enctype="multipart/form-data" class="upload-form">
            <div class="row">
                <div class="col-lg-8">
                    <div class="form-section">
                        <h3 class="section-title">Item Details</h3>
                        
                        <div class="form-floating mb-3">
                            <input type="text" name="title" class="form-control" id="itemTitle" placeholder="Item Title" required maxlength="100">
                            <label for="itemTitle">Item Title</label>
                        </div>

                        <div class="form-floating mb-3">
                            <select name="category" class="form-select" id="itemCategory" required>
                                <option value="">Select Category</option>
                                <option value="electronics">Electronics</option>
                                <option value="clothing">Clothing</option>
                                <option value="books">Books</option>
                                <option value="home">Home & Garden</option>
                                <option value="furniture">Furniture</option>
                                <option value="toys">Toys & Games</option>
                                <option value="sports">Sports & Fitness</option>
                                <option value="beauty">Beauty & Health</option>
                                <option value="music">Music & Instruments</option>
                                <option value="digital">Digital Items</option>
                                <option value="games">Video Games</option>
                                <option value="other">Other</option>
                            </select>
                            <label for="itemCategory">Category</label>
                        </div>

                        <div class="form-floating mb-3">
                            <textarea name="description" class="form-control description-textarea" id="itemDescription" placeholder="Describe your item..." required></textarea>
                            <label for="itemDescription">Item Description</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" name="desired_trade" class="form-control" id="desiredTrade" placeholder="What do you want in return?" required>
                            <label for="desiredTrade">What do you want in return?</label>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="form-section">
                        <h3 class="section-title">Item Photo</h3>
                        
                        <div class="image-upload-container">
                            <input type="file" name="image" class="form-control d-none" id="itemImage" accept="image/*" required>
                            <label for="itemImage" class="image-upload-label">
                                <div class="upload-placeholder" id="uploadPlaceholder">
                                    <i class="fas fa-cloud-upload-alt fa-3x"></i>
                                    <p>Click to upload image</p>
                                    <small class="text-muted">PNG, JPG, GIF up to 10MB</small>
                                </div>
                                <img id="imagePreview" class="image-preview d-none" alt="Preview">
                            </label>
                        </div>

                        <div class="upload-tips">
                            <h4>📸 Photo Tips</h4>
                            <ul>
                                <li>Use good lighting</li>
                                <li>Show multiple angles</li>
                                <li>Include all accessories</li>
                                <li>Keep background clean</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg btn-upload">
                    <i class="fas fa-upload"></i>
                    List Item for Trade
                </button>
                <a href="{{ url_for('home') }}" class="btn btn-outline-secondary btn-lg">
                    <i class="fas fa-times"></i>
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
.upload-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem;
}

.upload-header {
    text-align: center;
    margin-bottom: 3rem;
}

.upload-title {
    font-size: 2.5rem;
    color: #212529;
    margin-bottom: 1rem;
    font-weight: 700;
}

.upload-title i {
    color: #007bff;
    margin-right: 0.5rem;
}

.upload-subtitle {
    font-size: 1.1rem;
    color: #6c757d;
    margin-bottom: 0;
}

.upload-form-container {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

.form-section {
    background: #f8f9fa;
    padding: 1.5rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
    height: fit-content;
}

.section-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: #212529;
    margin-bottom: 1.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #007bff;
}

.form-control, .form-select {
    border: 2px solid #dee2e6;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-size: 1rem;
}

.form-control:focus, .form-select:focus {
    border-color: #007bff;
    box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.25);
}

.description-textarea {
    min-height: 120px;
    resize: vertical;
}

.image-upload-container {
    position: relative;
    margin-bottom: 1.5rem;
}

.image-upload-label {
    display: block;
    width: 100%;
    cursor: pointer;
    border: 2px dashed #dee2e6;
    border-radius: 8px;
    transition: all 0.3s;
}

.image-upload-label:hover {
    border-color: #007bff;
    background-color: rgba(0,123,255,0.05);
}

.upload-placeholder {
    padding: 3rem 1rem;
    text-align: center;
    color: #6c757d;
}

.upload-placeholder i {
    color: #007bff;
    margin-bottom: 1rem;
}

.upload-placeholder p {
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
    color: #212529;
    font-weight: 500;
}

.image-preview {
    width: 100%;
    max-height: 250px;
    object-fit: cover;
    border-radius: 8px;
}

.upload-tips {
    background: white;
    padding: 1rem;
    border-radius: 6px;
    border: 1px solid #dee2e6;
}

.upload-tips h4 {
    font-size: 1rem;
    font-weight: 600;
    color: #007bff;
    margin-bottom: 0.75rem;
}

.upload-tips ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.upload-tips li {
    padding: 0.25rem 0;
    color: #495057;
    font-size: 0.9rem;
}

.upload-tips li:before {
    content: "✓ ";
    color: #28a745;
    font-weight: bold;
}

.form-actions {
    text-align: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid #dee2e6;
}

.btn-upload {
    padding: 0.75rem 2rem;
    margin-right: 1rem;
    font-weight: 600;
    border-radius: 6px;
    transition: all 0.2s;
}

.btn-upload:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,123,255,0.3);
}

@media (max-width: 768px) {
    .upload-container {
        padding: 1rem;
    }
    
    .upload-title {
        font-size: 2rem;
    }
    
    .upload-form-container {
        padding: 1.5rem;
    }
    
    .form-section {
        padding: 1rem;
        margin-bottom: 1rem;
    }
    
    .form-actions {
        flex-direction: column;
    }
    
    .btn-upload {
        margin-right: 0;
        margin-bottom: 1rem;
        width: 100%;
    }
    
    .btn-outline-secondary {
        width: 100%;
    }
}
</style>

<script>
document.getElementById('itemImage').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('uploadPlaceholder');
            
            preview.src = e.target.result;
            preview.classList.remove('d-none');
            placeholder.classList.add('d-none');
        };
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
